<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transcript Lens</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- ===== Screen 1 — upload ===== -->
  <section id="view-upload" class="view active">
    <div class="hero">
      <div class="logo">TL</div>
      <h1>Transcript Lens</h1>
      <p class="lead">Upload an interview transcript — the system splits it into
        questions and answers and scores each response.</p>

      <label id="drop" class="dropzone">
        <input type="file" id="file" accept=".txt,text/plain" hidden />
        <div class="dz-icon">↥</div>
        <div class="dz-title">Drop a <b>.txt</b> file here or click to browse</div>
        <div class="dz-sub">Plain-text interview transcript</div>
      </label>

      <div class="or">or</div>
      <button id="use-demo" class="btn btn-primary">Use demo</button>

      <div id="upload-msg" class="upload-msg" hidden></div>
    </div>
  </section>

  <!-- ===== Screen 2 — results ===== -->
  <section id="view-results" class="view">
    <header class="rbar">
      <button id="back" class="btn btn-ghost">← Upload another</button>
      <h1 id="run-title"></h1>
    </header>

    <div class="rwrap">
      <div id="status" class="status" hidden>
        <span class="dot"></span> Analyzing transcript…
      </div>

      <div id="verdict" class="verdict" hidden></div>

      <ol id="qa" class="qa"></ol>
    </div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
