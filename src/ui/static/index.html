<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interview Assessment</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- ===== Screen 1 — upload ===== -->
  <section id="view-upload" class="view active">
    <div class="hero">
      <div class="logo">IA</div>
      <h1>Interview Assessment</h1>
      <p class="lead">Загрузите транскрипт интервью — система разберёт его на
        вопросы и ответы и оценит каждый ответ.</p>

      <label id="drop" class="dropzone">
        <input type="file" id="file" accept=".txt,text/plain" hidden />
        <div class="dz-icon">↥</div>
        <div class="dz-title">Перетащите <b>.txt</b> сюда или нажмите, чтобы выбрать</div>
        <div class="dz-sub">Транскрипт интервью в текстовом формате</div>
      </label>

      <div class="or">или</div>
      <button id="use-demo" class="btn btn-primary">Use demo</button>

      <div id="upload-msg" class="upload-msg" hidden></div>
    </div>
  </section>

  <!-- ===== Screen 2 — results ===== -->
  <section id="view-results" class="view">
    <header class="rbar">
      <button id="back" class="btn btn-ghost">← Загрузить другой</button>
      <h1 id="run-title"></h1>
    </header>

    <div class="rwrap">
      <div id="status" class="status" hidden>
        <span class="dot"></span> Анализирую интервью…
      </div>

      <div id="verdict" class="verdict" hidden></div>

      <ol id="qa" class="qa"></ol>
    </div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
